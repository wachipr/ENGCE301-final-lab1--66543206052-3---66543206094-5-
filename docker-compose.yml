services:

  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks: [taskboard-net]

  # ── Auth Service ────────────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    environment:
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      ${POSTGRES_DB}
      DB_USER:      ${POSTGRES_USER}
      DB_PASSWORD:  ${POSTGRES_PASSWORD}
      JWT_SECRET:   ${JWT_SECRET}
      JWT_EXPIRES:  ${JWT_EXPIRES}
      PORT:         3001
    depends_on:
      postgres: { condition: service_healthy }
    networks: [taskboard-net]
    restart: unless-stopped

  # ── Task Service ─────────────────────────────────────────────────────
  task-service:
    build: ./task-service
    environment:
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      ${POSTGRES_DB}
      DB_USER:      ${POSTGRES_USER}
      DB_PASSWORD:  ${POSTGRES_PASSWORD}
      JWT_SECRET:   ${JWT_SECRET}
      PORT:         3002
    depends_on:
      postgres:     { condition: service_healthy }
      auth-service: { condition: service_started }
    networks: [taskboard-net]
    restart: unless-stopped

  # ── Log Service ──────────────────────────────────────────────────────
  log-service:
    build: ./log-service
    environment:
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      ${POSTGRES_DB}
      DB_USER:      ${POSTGRES_USER}
      DB_PASSWORD:  ${POSTGRES_PASSWORD}
      JWT_SECRET:   ${JWT_SECRET}
      PORT:         3003
    depends_on:
      postgres: { condition: service_healthy }
    networks: [taskboard-net]
    restart: unless-stopped

  # ── Frontend (Static) ────────────────────────────────────────────────
  frontend:
    build: ./frontend
    networks: [taskboard-net]

  # ── Nginx (API Gateway + TLS) ────────────────────────────────────────
  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - auth-service
      - task-service
      - log-service
      - frontend
    networks: [taskboard-net]
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  taskboard-net:
    driver: bridge